# Dependabot dependency updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
# Updates are consolidated into one monthly pull request per ecosystem.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    # @noble/hashes v2 restructured its module paths (argon2/utils); the major bump
    # needs a code migration, so major updates for it are excluded from automation.
    ignore:
      - dependency-name: "@noble/hashes"
        update-types: ["version-update:semver-major"]
    groups:
      npm-root:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    groups:
      github-actions-root:
        patterns:
          - "*"
