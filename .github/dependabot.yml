# Dependabot dependency updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
# Updates are consolidated into one monthly pull request per ecosystem.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    # Auto-update minor/patch only. Major bumps (e.g. @noble/hashes v2, zod 4,
    # vitest 4) need deliberate migration, so they are excluded from automation.
    # Dependabot security updates still apply regardless of this setting.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      npm-root:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    groups:
      github-actions-root:
        patterns:
          - "*"
